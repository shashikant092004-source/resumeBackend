<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Resume Templates</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #333;
            text-align: center;
            padding: 20px;
        }

        .template-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        .card {
            width: 250px;
            height: 300px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            overflow: auto;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .active {
            border: 3px solid #667eea;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Welcome to Resume Templates</h1>
    <p>Select a template</p>

    <div class="template-container">
        <div class="card active" id="template1" onclick="selectTemplate(this)"></div>
        <div class="card" id="template2" onclick="selectTemplate(this)"></div>
    </div>

    <button onclick="downloadResume()">Download Resume</button>
    <button onclick="logout()">Logout</button>

    <script>
        const token = localStorage.getItem("token");
        const user = JSON.parse(localStorage.getItem("userName"));

        const resumeId = user?.id || "69d26f9e97a0a3ea5163806a";

        // 🔥 Fetch resume
        async function downloadResume() {
            try {
                const response = await fetch(
                    `https://resumebackend-1-v08r.onrender.com/api/resume/${resumeId}`
                );

                if (response.ok) {
                    const data = await response.json();
                    console.log("Resume Data:", data);

                    renderTemplates(data);
                } else {
                    alert("Error fetching data");
                }
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        function renderTemplates(apiResponse) {
            const t1 = document.getElementById("template1");
            const t2 = document.getElementById("template2");

            const resume = apiResponse.data[0];
            const education = resume.education || [];
            const skills = resume.skills || [];
            const projects = resume.projects || [];

            // ================= TEMPLATE 1 (Modern Clean) =================
            t1.innerHTML = `
        <div style="text-align:left;">
            <h2 style="color:#667eea;">${resume.fullName}</h2>
            <p>${resume.email}</p>
            <hr>

            <h3>🎓 Education</h3>
            ${education.map(item => `
                <p><b>${item.degree}</b> - ${item.institution}</p>
                <small>${item.startYear} - ${item.endYear}</small>
            `).join("")}

            <h3>💡 Skills</h3>
            <div style="display:flex; flex-wrap:wrap; gap:5px;">
                ${skills.map(skill => `
                    <span style="background:#667eea;color:white;padding:5px 10px;border-radius:5px;">
                        ${skill}
                    </span>
                `).join("")}
            </div>

            <h3>📂 Projects</h3>
            ${projects.map(project => `
                <p><b>${project.title}</b></p>
                <small>${project.description}</small>
            `).join("")}
        </div>
    `;

            // ================= TEMPLATE 2 (Professional Card Style) =================
            t2.innerHTML = `
        <div style="text-align:left;">
            <div style="background:#667eea;color:white;padding:10px;border-radius:5px;">
                <h2>${resume.fullName}</h2>
                <p>${resume.email}</p>
            </div>

            <div style="padding:10px;">
                <h3>Education</h3>
                ${education.map(item => `
                    <p><b>${item.degree}</b></p>
                    <p>${item.institution}</p>
                    <small>${item.startYear} - ${item.endYear}</small>
                    <hr>
                `).join("")}

                <h3>Skills</h3>
                <ul>
                    ${skills.map(skill => `<li>${skill}</li>`).join("")}
                </ul>

                <h3>Projects</h3>
                ${projects.map(project => `
                    <p><b>${project.title}</b></p>
                    <p>${project.description}</p>
                    <hr>
                `).join("")}
            </div>
        </div>
    `;
        }


        // 🔥 Select template
        function selectTemplate(card) {
            document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
            card.classList.add("active");

            // Save selected template
            localStorage.setItem("selectedTemplate", card.id);
        }

        // 🔥 Logout
        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("userName");
            window.location.href = "index.html";
        }

        // 🔥 Load data on page load
        downloadResume();
    </script>

</body>

</html>
